name: Setup Node.js
description: Checkout, setup Node.js with npm cache, and install dependencies via npm ci.

runs:
  using: composite
  steps:
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '24'
        cache: 'npm'

    - name: Install dependencies
      shell: bash
      run: npm ci
