name: CI

on:
  pull_request:
    branches:
      - master

jobs:
  # ────────────────────────────────────────────────
  # JOB 1 — Security Audit
  # ────────────────────────────────────────────────
  security-check:
    name: Security Audit
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: npm audit
        run: npm audit --audit-level=high || true

  # ────────────────────────────────────────────────
  # JOB 2 — Static Analysis
  # ────────────────────────────────────────────────
  static-analysis:
    name: Static Analysis
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npx tsc --noEmit

  # ────────────────────────────────────────────────
  # JOB 3 — Build & Test
  # ────────────────────────────────────────────────
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest
    needs: [security-check, static-analysis]

    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: openjob_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:8-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      rabbitmq:
        image: rabbitmq:4.3-management-alpine
        ports:
          - 5672:5672
          - 15672:15672
        options: >-
          --health-cmd "rabbitmq-diagnostics -q ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/openjob_test
      ACCESS_TOKEN_KEY: ci_access_token_secret
      REFRESH_TOKEN_KEY: ci_refresh_token_secret
      REDIS_HOST: localhost
      REDIS_PORT: 6379
      RABBITMQ_HOST: localhost
      RABBITMQ_PORT: 5672
      RABBITMQ_USER: guest
      RABBITMQ_PASSWORD: guest
      S3_ENDPOINT: http://localhost:9000
      S3_REGION: us-east-1
      S3_ACCESS_KEY: minioadmin
      S3_SECRET_KEY: minioadmin
      S3_BUCKET_NAME: openjob-test-bucket
      MAIL_HOST: localhost
      MAIL_PORT: 1025
      MAIL_USER: test_user
      MAIL_PASSWORD: test_password
      PORT: 5000

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Start MinIO
        run: |
          docker run -d \
            --name minio \
            -p 9000:9000 \
            -p 9001:9001 \
            -e MINIO_ROOT_USER=minioadmin \
            -e MINIO_ROOT_PASSWORD=minioadmin \
            minio/minio:RELEASE.2025-07-23T15-54-02Z server /data --console-address ":9001"
          echo "✅ MinIO container started"

      - name: Wait for services
        run: |
          echo "🔍 Waiting for PostgreSQL..."
          for i in {1..30}; do
            if pg_isready -h 127.0.0.1 -p 5432 -q; then
              echo "✅ PostgreSQL is ready!"
              break
            fi
            echo "   Waiting... ($i/30)"; sleep 2
          done

          echo "🔍 Waiting for Redis..."
          for i in {1..30}; do
            if redis-cli -h 127.0.0.1 ping > /dev/null 2>&1; then
              echo "✅ Redis is ready!"
              break
            fi
            echo "   Waiting... ($i/30)"; sleep 2
          done

          echo "🔍 Waiting for RabbitMQ..."
          for i in {1..30}; do
            if docker exec $(docker ps -qf "ancestor=rabbitmq:4.3-management-alpine") rabbitmq-diagnostics -q ping > /dev/null 2>&1; then
              echo "✅ RabbitMQ is ready!"
              break
            fi
            echo "   Waiting... ($i/30)"; sleep 2
          done

          echo "🔍 Waiting for MinIO..."
          for i in {1..30}; do
            if curl -sf http://127.0.0.1:9000/minio/health/live > /dev/null 2>&1; then
              echo "✅ MinIO is ready!"
              break
            fi
            echo "   Waiting... ($i/30)"; sleep 2
          done

      - name: Setup MinIO bucket
        run: |
          wget -q https://dl.min.io/client/mc/release/linux-amd64/mc
          chmod +x mc
          ./mc alias set minio http://127.0.0.1:9000 minioadmin minioadmin
          ./mc mb minio/openjob-test-bucket --ignore-existing
          echo "✅ Bucket 'openjob-test-bucket' created"

      - name: Build
        run: npm run build

      - name: Run unit tests
        run: npm run test -- --passWithNoTests --forceExit
